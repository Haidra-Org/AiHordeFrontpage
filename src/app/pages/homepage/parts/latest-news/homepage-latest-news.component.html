<section class="section-secondary">
  <div class="container-content-minimal">
    <div class="grid-items">
      <div class="text-secondary sm:text-lg">
        <h2 class="mb-3 heading-section-lg">
          <a routerLink="/news/">
            {{ "latest_news.title" | transloco }}
          </a>
        </h2>
        @if (news().length > 0) {
          @for (newsItem of news(); track newsItem.title) {
            <div class="news-home-item">
              <h3 class="news-home-heading">
                <span class="news-home-date">{{ newsItem.datePublished }}</span>
                - <span [innerHTML]="newsItem.title"></span>
              </h3>
              @if (newsItem.excerpt) {
                <p
                  class="news-home-text"
                  [innerHTML]="newsItem.excerpt | markdown | stripWrapperTag"
                ></p>
              }
              @if (newsItem.moreLink) {
                <p class="news-home-text">
                  <a
                    [href]="newsItem.moreLink"
                    target="_blank"
                    class="external-link"
                    >{{ "read_more" | transloco }}</a
                  >
                </p>
              }
            </div>
          }
        } @else {
          <!-- Loading skeleton for news -->
          <div class="skeleton-pulse space-y-4">
            @for (i of [1, 2, 3]; track i) {
              <div class="mb-4">
                <div class="news-skeleton-bar news-skeleton-bar--title"></div>
                <div class="space-y-2">
                  <div class="news-skeleton-bar news-skeleton-bar--line"></div>
                  <div
                    class="news-skeleton-bar news-skeleton-bar--line-short"
                  ></div>
                  <div
                    class="news-skeleton-bar news-skeleton-bar--line-shorter"
                  ></div>
                </div>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</section>
