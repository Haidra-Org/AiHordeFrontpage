<section class="section-primary">
  <div class="container-page-header">
    <div class="place-center">
      <h1 class="heading-hero">
        {{ "contribute.title" | transloco }}
      </h1>
      <p class="text-description mt-4 max-w-3xl">
        {{ "contribute.subtitle" | transloco }}
      </p>
    </div>
  </div>
</section>

<section class="section-secondary">
  <div class="container-page-content">
    <!-- Tab Navigation -->
    <div
      class="details-tabs details-tabs--glass details-tabs--connected tabs-container--centered"
      role="tablist"
      appScrollFade
      [appStickyHeader]="10"
    >
      <a
        routerLink="workers"
        class="details-tab"
        routerLinkActive="details-tab-active"
        role="tab"
      >
        <svg
          class="icon-sm"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 0 6h13.5a3 3 0 1 0 0-6m-16.5-3a3 3 0 0 1 3-3h13.5a3 3 0 1 0 0-6H5.25a3 3 0 0 0-3 3m16.5 0h.008v.008h-.008V5.25Zm0 8.25h.008v.008h-.008v-.008ZM5.25 6h.008v.008H5.25V6Z"
          />
        </svg>
        {{ "contribute.tabs.workers" | transloco }}
      </a>
      <a
        routerLink="donate"
        class="details-tab"
        routerLinkActive="details-tab-active"
        role="tab"
      >
        <svg
          class="icon-sm"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"
          />
        </svg>
        {{ "contribute.tabs.donate" | transloco }}
      </a>
    </div>

    <!-- Tab Content -->
    <div class="tab-content-panel">
      <router-outlet />
    </div>
  </div>
</section>
