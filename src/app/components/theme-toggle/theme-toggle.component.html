<div class="relative">
  <!-- Toggle Button -->
  <button
    type="button"
    class="inline-flex items-center p-2 text-sm text-gray-500 rounded-lg hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600"
    [attr.aria-expanded]="isOpen()"
    aria-label="Toggle theme menu"
    (click)="toggleDropdown()"
  >
    <span class="sr-only">Toggle theme</span>

    <!-- Sun icon (shown in dark mode) -->
    @if (themeService.isDark()) {
      <inline-svg
        href="assets/img/sun.svg"
        class="w-5 h-5"
        aria-hidden="true"
      />
    }

    <!-- Moon icon (shown in light mode) -->
    @if (!themeService.isDark()) {
      <inline-svg
        href="assets/img/moon.svg"
        class="w-5 h-5"
        aria-hidden="true"
      />
    }
  </button>

  <!-- Dropdown Menu -->
  @if (isOpen()) {
    <div
      class="absolute right-0 z-50 mt-2 w-48 bg-white rounded-lg shadow-lg dark:bg-gray-700 border border-gray-200 dark:border-gray-600"
    >
      <ul
        class="py-1 text-sm text-gray-700 dark:text-gray-200"
        role="menu"
        aria-orientation="vertical"
        aria-labelledby="theme-menu-button"
      >
        <!-- Light Mode Option -->
        <li>
          <button
            type="button"
            class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 flex items-center justify-between"
            [class.bg-gray-100]="isSelected('light') && !themeService.isDark()"
            [class.bg-gray-600]="isSelected('light') && themeService.isDark()"
            role="menuitem"
            (click)="selectTheme('light')"
          >
            <span class="flex items-center gap-2">
              <inline-svg
                href="assets/img/sun.svg"
                class="w-4 h-4"
                aria-hidden="true"
              />
              <span>Light</span>
            </span>
            @if (isSelected("light")) {
              <app-icon
                name="check-filled"
                class="w-4 h-4 text-purple-600 dark:text-purple-400"
                viewBox="0 0 20 20"
                aria-hidden="true"
              />
            }
          </button>
        </li>

        <!-- Dark Mode Option -->
        <li>
          <button
            type="button"
            class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 flex items-center justify-between"
            [class.bg-gray-100]="isSelected('dark') && !themeService.isDark()"
            [class.bg-gray-600]="isSelected('dark') && themeService.isDark()"
            role="menuitem"
            (click)="selectTheme('dark')"
          >
            <span class="flex items-center gap-2">
              <inline-svg
                href="assets/img/moon.svg"
                class="w-4 h-4"
                aria-hidden="true"
              />
              <span>Dark</span>
            </span>
            @if (isSelected("dark")) {
              <app-icon
                name="check-filled"
                class="w-4 h-4 text-purple-600 dark:text-purple-400"
                viewBox="0 0 20 20"
                aria-hidden="true"
              />
            }
          </button>
        </li>

        <!-- System Mode Option -->
        <li>
          <button
            type="button"
            class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 flex items-center justify-between"
            [class.bg-gray-100]="isSelected('system') && !themeService.isDark()"
            [class.bg-gray-600]="isSelected('system') && themeService.isDark()"
            role="menuitem"
            (click)="selectTheme('system')"
          >
            <span class="flex items-center gap-2">
              <app-icon
                name="monitor"
                class="w-4 h-4"
                viewBox="0 0 20 20"
                aria-hidden="true"
              />
              <span>System</span>
            </span>
            @if (isSelected("system")) {
              <app-icon
                name="check-filled"
                class="w-4 h-4 text-purple-600 dark:text-purple-400"
                viewBox="0 0 20 20"
                aria-hidden="true"
              />
            }
          </button>
        </li>
      </ul>
    </div>
  }
</div>
