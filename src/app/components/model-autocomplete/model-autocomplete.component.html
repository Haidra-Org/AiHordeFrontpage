<div class="autocomplete-wrapper" #wrapper>
  <div class="autocomplete-input-row">
    <input
      [id]="inputId()"
      type="text"
      class="form-input form-input-wide autocomplete-input"
      [class.form-input-error]="invalid()"
      [value]="value()"
      [disabled]="isDisabled()"
      autocomplete="off"
      [placeholder]="placeholderKey() | transloco"
      role="combobox"
      [attr.aria-expanded]="dropdownOpen()"
      [attr.aria-controls]="listboxId()"
      [attr.aria-activedescendant]="activeOptionId()"
      (input)="onInput($event)"
      (keydown)="onInputKeydown($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />
    <button
      type="button"
      class="autocomplete-toggle"
      [disabled]="isDisabled()"
      (mousedown)="$event.preventDefault()"
      (click)="toggleModelDropdown()"
      [attr.aria-expanded]="dropdownOpen()"
      [attr.aria-label]="toggleAriaLabelKey() | transloco"
    >
      <span
        class="autocomplete-chevron"
        [class.autocomplete-chevron--open]="dropdownOpen()"
        >&#9662;</span
      >
    </button>
  </div>

  @if (dropdownOpen()) {
    <div
      class="autocomplete-dropdown surface-floating"
      [id]="listboxId()"
      role="listbox"
      [attr.aria-label]="listAriaLabelKey() | transloco"
      (mousedown)="$event.preventDefault()"
    >
      @if (hiddenModelCount() > 0) {
        <div class="autocomplete-hidden-notice">
          {{ hiddenCountKey() | transloco: { count: hiddenModelCount() } }}
        </div>
      }

      @for (model of filteredModels(); track model.name) {
        <div
          class="autocomplete-option"
          [class.autocomplete-option--active]="activeOptionIndex() === $index"
          [id]="getOptionId($index)"
          role="option"
          tabindex="-1"
          [attr.aria-selected]="activeOptionIndex() === $index"
          (mouseenter)="onOptionMouseEnter($index)"
          (click)="selectModel(model.name)"
          (keydown.enter)="onOptionKeydown($event, model.name)"
          (keydown.space)="onOptionKeydown($event, model.name)"
        >
          {{ model.name }}
          <span class="text-secondary">({{ model.count }} workers)</span>
        </div>
      }

      @if (filteredModels().length === 0) {
        <div class="autocomplete-empty">
          {{ emptyKey() | transloco }}
        </div>
      }
    </div>
  }
</div>
